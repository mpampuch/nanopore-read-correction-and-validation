# Example parameters for Yak Quality Assessment Pipeline

# Input data paths
illumina_reads: "data/illumina/*_{R1,R2}.fastq.gz"
nanopore_reads: "data/nanopore/*.fastq.gz"

# Output directory
outdir: "results"

# Computational resources
threads: 8
max_memory: "32.GB"
max_cpus: 16
max_time: "48.h"

# Yak analysis parameters
kmer_size: 37
yak_bloomfilter_bits: 37

# Example execution:
# nextflow run main.nf -params-file params.yml

# Or with custom parameters:
# nextflow run main.nf \
#   --illumina_reads "path/to/illumina/*_{R1,R2}.fastq.gz" \
#   --nanopore_reads "path/to/nanopore/*.fastq.gz" \
#   --outdir custom_results \
#   --threads 16 \
#   --kmer_size 31